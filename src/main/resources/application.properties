spring.application.name=ultron
# Server Configuration
server.port=8080
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/rentora
spring.datasource.username=postgres
spring.datasource.password=avikal
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=your-256-bit-secret-change-this-in-production
# 24 hours in milliseconds
jwt.expiration=86400000
logging.level.org.springframework.security=TRACE

# Ollama Configuration
ollama.url=http://localhost:11434/api/generate
ollama.model=phi3

# Logging Configuration
logging.file.name=assistant-backend.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.Ghosts.ultron=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Configuration
app.name=Personal Assistant Backend
app.version=1.0.0
app.description=Backend service for personal assistant with AI capabilities
app.default-user-limit=1000
app.max-input-length=1000
app.max-memory-size=10000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=truelogging.level.org.springframework.security=DEBUG
